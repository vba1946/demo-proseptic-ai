<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Система с AI-консультантом — Демо</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
.chat-container { width: 100%; max-width: 800px; height: 100vh; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
.header { background: linear-gradient(135deg, #1a3a6b, #2b579a); color: #fff; padding: 18px 24px; flex-shrink: 0; }
.header h1 { font-size: 17px; font-weight: 600; }
.header .sub { font-size: 12px; opacity: 0.8; margin-top: 4px; display: flex; justify-content: space-between; }
.header .sub .info { opacity: 0.7; }
.header .tier-badge { display: inline-block; background: rgba(255,255,255,0.15); padding: 2px 10px; border-radius: 10px; font-size: 11px; margin-left: 8px; }
.messages { flex: 1; overflow-y: auto; padding: 20px 24px; }
.msg { margin-bottom: 16px; display: flex; }
.msg.user { justify-content: flex-end; }
.msg .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
.msg.user .bubble { background: #1a3a6b; color: #fff; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: #f0f2f5; color: #1a1a1a; border-bottom-left-radius: 4px; }
.input-area { display: flex; gap: 10px; padding: 16px 24px; border-top: 1px solid #e0e0e0; flex-shrink: 0; }
.input-area input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #1a3a6b; }
.input-area button { padding: 12px 24px; background: #1a3a6b; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.loading { text-align: center; color: #999; font-size: 13px; padding: 8px; }
.error-page { text-align: center; padding: 40px 20px; }
.error-page h2 { color: #d32f2f; margin-bottom: 12px; }
.error-page p { color: #666; font-size: 14px; }
</style>
</head>
<body>
{% if error %}
<div class="chat-container">
  <div class="header"><h1>Система с AI-консультантом</h1><div class="sub"><span>Демонстрация</span></div></div>
  <div class="error-page">
    <h2>{{ error }}</h2>
    <p>Для получения доступа к демонстрации обратитесь к разработчику.</p>
  </div>
</div>
{% else %}
<div class="chat-container">
  <div class="header">
    <h1>Система с AI-консультантом<span class="tier-badge">{{ tier }}</span></h1>
    <div class="sub"><span>Демонстрация</span><span class="info">Вопросов: <span id="counter">{{ questions_left }}</span>/{{ max_questions }} · {{ expiry_readable }}</span></div>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot"><div class="bubble" id="welcomeMsg"></div></div>
  </div>
  <div class="input-area">
    <input type="text" id="input" placeholder="Задайте вопрос..." autofocus>
    <button id="sendBtn" onclick="send()">Отправить</button>
  </div>
</div>
<script>
const token = '{{ token }}';
const maxQuestions = Number('{{ max_questions }}');
const tier = '{{ tier }}';
const categories = {{ categories | tojson }};
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const counter = document.getElementById('counter');

let welcomeText;
if (tier === 'dev') {
  welcomeText = 'Здравствуйте, я AI-консультант, меня зовут Владимир. Я готов отвечать на доступные вам 999 вопросов, по всем 6 категориям:\n' + categories.join('\n') + '\nДлина каждого вопроса должна быть до 80 символов с пробелами, но только на 1 тему (категорию) автономной канализации.\nНачинаем.';
} else if (tier === 'company') {
  welcomeText = 'Здравствуйте, я AI-консультант, меня зовут Владимир. Я готов отвечать на доступные вам 18 вопросов, по 3 на каждую из 6 категорий:\n' + categories.join('\n') + '\nДлина каждого вопроса должна быть до 80 символов с пробелами, но только на 1 тему (категорию) автономной канализации.\nНачинаем.';
} else if (tier === 'simple') {
  welcomeText = 'Здравствуйте, я AI-консультант, меня зовут Владимир. Тариф Simple: до 7 вопросов, 1 категория из 6:\n' + categories.join('\n') + '\nДлина каждого вопроса должна быть до 80 символов с пробелами, но только на 1 тему (категорию) автономной канализации.\nНачинаем.';
} else {
  welcomeText = 'Здравствуйте, я AI-консультант, меня зовут Владимир. Тариф PRO: до 10 вопросов, все 6 категорий:\n' + categories.join('\n') + '\nДлина каждого вопроса должна быть до 80 символов с пробелами, но только на 1 тему (категорию) автономной канализации.\nНачинаем.';
}

document.getElementById('welcomeMsg').textContent = welcomeText;

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMsg('user', text);
  input.value = '';
  sendBtn.disabled = true;
  const idx = addLoading();

  try {
    const r = await fetch('/ask', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({question: text, token: token}) });
    const data = await r.json();
    removeLoading(idx);
    if (data.questions_left !== undefined) {
      counter.textContent = data.questions_left;
      if (data.questions_left <= 0) {
        input.disabled = true;
        sendBtn.disabled = true;
      }
    }
    addMsg('bot', data.answer);
    if (data.exhausted) {
      addContactForm();
    }
  } catch {
    removeLoading(idx);
    addMsg('bot', 'Ошибка соединения.');
  }
  sendBtn.disabled = false;
  input.focus();
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="bubble"><div class="loading">...</div></div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return messages.children.length - 1;
}

function removeLoading(idx) {
  const children = messages.children;
  if (idx < children.length) children[idx].remove();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addContactForm() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="bubble contact-form"><p style="margin:0 0 8px;font-size:13px;color:#333;">Оставьте ваши контакты, менеджер свяжется с вами:</p><input type="text" id="contactName" placeholder="Имя" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:6px;box-sizing:border-box;"><input type="tel" id="contactPhone" placeholder="Телефон" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:6px;box-sizing:border-box;"><button onclick="submitContact(this)" style="width:100%;padding:8px;background:#1a3a6b;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">Отправить</button><span id="contactStatus" style="display:block;margin-top:6px;font-size:12px;color:#666;"></span></div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function submitContact(btn) {
  const name = document.getElementById('contactName').value.trim();
  const phone = document.getElementById('contactPhone').value.trim();
  const status = document.getElementById('contactStatus');
  if (!name || !phone) { status.textContent = 'Заполните имя и телефон.'; return; }
  status.textContent = 'Отправка...';
  try {
    const r = await fetch('/contact', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({token: token, name: name, phone: phone}) });
    const data = await r.json();
    status.textContent = data.message;
    if (data.ok) {
      document.getElementById('contactName').disabled = true;
      document.getElementById('contactPhone').disabled = true;
      document.querySelector('.contact-form button').disabled = true;
    }
  } catch {
    status.textContent = 'Ошибка отправки. Попробуйте позже.';
  }
}
</script>
{% endif %}
</body>
</html>
